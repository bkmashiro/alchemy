# Example: Learning Rate Sweep Chain
# Submit with: alchemy submit config/example-chain.yaml
#
# This example sweeps over 4 learning rates × 2 batch sizes = 8 total jobs,
# then runs a final evaluation after all sweep jobs complete.

version: "1"

chain:
  name: lr_sweep_v1
  strategy: sweep
  # Run up to 4 sweep jobs in parallel
  maxConcurrent: 4
  # Stop all jobs if one fails
  failFast: false

  # The parameter grid — all combinations are submitted
  sweepGrid:
    lr: [0.001, 0.0003, 0.0001, 0.00003]
    batch_size: [32, 64]

  # Template job — {{lr}} and {{batch_size}} are replaced with grid values
  sweepBaseJob:
    name: "sweep_lr{{lr}}_bs{{batch_size}}"
    command: "python train.py --lr {{lr}} --batch-size {{batch_size}} --epochs 50"
    resources:
      partition: a30
      time: "02:00:00"
      mem: 32G
      gpus: 1
    tags: [sweep, lr_search]

